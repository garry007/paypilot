name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Service tests
  # ---------------------------------------------------------------------------

  test-auth-service:
    name: Test – auth-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/auth-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/auth-service/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-auth-service
          path: backend/auth-service/coverage.xml
          retention-days: 7

  test-transaction-service:
    name: Test – transaction-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/transaction-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/transaction-service/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-transaction-service
          path: backend/transaction-service/coverage.xml
          retention-days: 7

  test-fraud-service:
    name: Test – fraud-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/fraud-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/fraud-service/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-fraud-service
          path: backend/fraud-service/coverage.xml
          retention-days: 7

  test-api-gateway:
    name: Test – api-gateway (import check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/api-gateway
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/api-gateway/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check main module imports correctly
        run: python -c "import ast, sys; ast.parse(open('main.py').read()); print('main.py parsed OK')"

  # ---------------------------------------------------------------------------
  # Linting
  # ---------------------------------------------------------------------------

  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 backend/ --max-line-length=100 --exclude=backend/**/__pycache__,backend/**/.pytest_cache

  # ---------------------------------------------------------------------------
  # Build & push container images (main branch only)
  # ---------------------------------------------------------------------------

  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test-auth-service, test-transaction-service, test-fraud-service, lint]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push auth-service
        uses: docker/build-push-action@v6
        with:
          context: ./backend/auth-service
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/paypilot-auth-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push transaction-service
        uses: docker/build-push-action@v6
        with:
          context: ./backend/transaction-service
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/paypilot-transaction-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push fraud-service
        uses: docker/build-push-action@v6
        with:
          context: ./backend/fraud-service
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/paypilot-fraud-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push api-gateway
        uses: docker/build-push-action@v6
        with:
          context: ./backend/api-gateway
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/paypilot-api-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
